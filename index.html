<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DuoLinguas &middot; Schedule</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#F1EFE8; --s1:#E8E5DC; --s2:#EDEAE1;
  --border:rgba(28,25,23,0.10); --bhi:rgba(28,25,23,0.20);
  --text:#1C1917; --muted:#888780; --muted2:#555250;
  --coral:#D85A30; --petrol:#1A2235;
}
body { background:var(--bg); color:var(--text); font-family:'Lora',Georgia,serif; font-weight:400; min-height:100vh; max-width:540px; margin:0 auto; padding-bottom:24px; }

/* HEADER */
.header { padding:16px 16px 12px; display:grid; grid-template-columns:1fr 1.4fr 1fr; align-items:center; gap:8px; }
.logo-col { display:flex; justify-content:center; }
.name-col { text-align:center; }
.wordmark { font-family:'EB Garamond',Georgia,serif; font-size:24px; letter-spacing:.08em; line-height:1.1; }
.school { font-size:10px; color:var(--muted); letter-spacing:.22em; text-transform:uppercase; margin-top:4px; }
.info-col { display:flex; flex-direction:column; gap:5px; align-items:flex-end; }
.clock-box { border:0.5px solid var(--border); border-radius:4px; overflow:hidden; width:100%; }
.clock-row { padding:4px 8px; display:flex; align-items:center; justify-content:space-between; }
.clock-row+.clock-row { border-top:0.5px solid var(--border); }
.clock-lbl { font-size:10px; color:var(--muted); letter-spacing:.1em; }
.clock-val { font-family:'EB Garamond',serif; font-size:16px; font-variant-numeric:tabular-nums; }
#t-sp { color:var(--text); } #t-at { color:var(--coral); }
.weather-box { border:0.5px solid var(--border); border-radius:4px; padding:4px 8px; width:100%; display:flex; align-items:center; justify-content:space-between; }
.weather-lbl { font-size:10px; color:var(--muted); letter-spacing:.08em; }
.weather-val { font-family:'EB Garamond',serif; font-size:16px; color:var(--text); }
.weather-ico { font-size:15px; color:var(--coral); }

/* DIVIDER */
.div { display:flex; align-items:center; padding:8px 36px; }
.div-line { flex:1; height:0.5px; background:#3D3D3A; opacity:.4; }
.div-dot { width:7px; height:7px; border-radius:50%; background:var(--coral); margin:0 16px; flex-shrink:0; }

/* USER */
.user { text-align:center; padding:4px 20px 6px; }
.user-name { font-family:'EB Garamond',serif; font-size:20px; display:flex; align-items:center; justify-content:center; gap:8px; }
.user-icon { font-size:14px; color:var(--muted); }
.prog-row { font-size:12px; color:var(--muted); margin-top:5px; display:flex; align-items:center; justify-content:center; gap:6px; flex-wrap:wrap; }
.ass-tag { font-size:10px; color:var(--coral); border:0.5px solid var(--coral); padding:1px 6px; border-radius:2px; letter-spacing:.08em; white-space:nowrap; }

/* STATS */
.stats { display:flex; align-items:flex-start; justify-content:space-around; padding:6px 16px 8px; }
.stat-col { text-align:center; width:90px; }
.circle { width:80px; height:80px; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; margin:0 auto; }
.circle-cd  { background:rgba(28,25,23,0.07); border:1px solid rgba(28,25,23,0.15); }
.circle-dark { background:rgba(28,25,23,0.78); border:1px solid rgba(28,25,23,0.78); }
.circle-status { border:1px solid; }
.stat-num { font-family:'EB Garamond',serif; font-size:36px; line-height:1; }
.stat-unit { font-size:11px; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-top:1px; }
.stat-num-light { font-family:'EB Garamond',serif; font-size:32px; color:var(--bg); line-height:1; }
.stat-check { color:var(--coral); font-size:12px; line-height:1; margin-top:1px; }
.stat-label { font-size:14px; font-style:italic; color:var(--muted2); margin-top:5px; line-height:1.3; }

/* CALENDAR */
.cal { padding:0 14px 6px; }
.cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.cal-nav-center { display:flex; align-items:center; gap:8px; }
.nav-btn { background:none; border:0.5px solid var(--border); border-radius:3px; width:26px; height:26px; font-family:'EB Garamond',serif; font-size:18px; color:var(--muted); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:border-color .15s,color .15s; }
.nav-btn:hover { border-color:var(--bhi); color:var(--text); }
.week-lbl { font-family:'EB Garamond',serif; font-size:15px; letter-spacing:.04em; }
.time-nav { display:flex; gap:4px; }
.cal-grid { display:grid; grid-template-columns:62px repeat(7,1fr); }
.day-hdr { text-align:center; padding-bottom:8px; }
.day-s { font-size:10px; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:2px; }
.day-n { font-family:'EB Garamond',serif; font-size:17px; }
.day-n.today { color:var(--coral); }
.today-pip { width:4px; height:4px; border-radius:50%; background:var(--coral); margin:2px auto 0; }
.day-gap { height:6px; }
.tlbl { text-align:right; padding-right:8px; padding-top:12px; display:flex; flex-direction:column; align-items:flex-end; gap:2px; min-width:58px; }
.tz-br { font-size:11px; color:var(--muted2); letter-spacing:.02em; font-family:'EB Garamond',serif; }
.tz-at { font-size:10px; color:var(--coral); opacity:.85; letter-spacing:.02em; font-family:'EB Garamond',serif; }
.slot { height:54px; margin:1px; border-radius:3px; border:0.5px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:border-color .12s,background .12s; font-size:11px; letter-spacing:.06em; }
.slot:hover:not(.busy):not(.past) { border-color:var(--bhi); background:rgba(28,25,23,0.04); }
.slot.busy { border:0.5px solid rgba(216,90,48,0.3); background:rgba(216,90,48,0.12); cursor:default; color:var(--coral); }
.slot.past { border-color:transparent; opacity:.2; pointer-events:none; }
.slot.selected { border-color:var(--coral); background:rgba(216,90,48,0.08); }

/* BANNER */
.banner { margin:6px 14px; padding:12px 14px; background:var(--s1); border:0.5px solid rgba(216,90,48,0.35); border-radius:4px; display:none; }
.banner.show { display:block; }
.banner-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; }
.banner-time { font-family:'EB Garamond',serif; font-size:18px; }
.banner-sub { font-size:11px; color:var(--muted); margin-top:3px; letter-spacing:.04em; }
.banner-close { background:none; border:none; color:var(--muted); cursor:pointer; font-size:18px; font-family:serif; padding:0 2px; line-height:1; }
.contact-row { display:flex; gap:16px; align-items:center; }
.cbtn { background:none; border:none; cursor:pointer; color:var(--coral); padding:0; width:26px; height:26px; display:flex; align-items:center; justify-content:center; opacity:.8; transition:opacity .15s; }
.cbtn:hover { opacity:1; }
.cbtn svg { width:24px; height:24px; }

/* FOOTER */
footer { padding:8px 20px 20px; text-align:center; border-top:0.5px solid var(--border); margin-top:8px; }
.slogan { font-family:'EB Garamond',serif; font-style:italic; font-size:15px; color:var(--muted); letter-spacing:.04em; margin-bottom:10px; }
.foot-icons { display:flex; align-items:center; justify-content:center; gap:20px; margin-bottom:8px; }
.ficon { background:none; border:none; cursor:pointer; color:var(--coral); padding:0; width:28px; height:28px; display:flex; align-items:center; justify-content:center; opacity:.8; transition:opacity .15s; }
.ficon:hover { opacity:1; }
.ficon svg { width:24px; height:24px; }
.foot-by { font-size:10px; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; }

/* DARK MODE */
@media (prefers-color-scheme: dark) {
  :root { --bg:#1C1917; --s1:#242220; --s2:#1E1D1B; --border:rgba(241,239,232,0.08); --bhi:rgba(241,239,232,0.16); --text:#F1EFE8; --muted:#888780; --muted2:#D3D1C7; }
  #logo-bg { fill:#F1EFE8; } #logo-d1,#logo-d2 { fill:#1A2235; }
  .circle-dark { background:rgba(241,239,232,0.75); }
  .stat-num-light { color:#1C1917; }
  .circle-cd { background:rgba(241,239,232,0.07); border-color:rgba(241,239,232,0.15); }
}
</style>
</head>

<script>
// ═══════════════════════════════════════
// EASY CONFIG — edit in GitHub
// ═══════════════════════════════════════
const LESSONS_DONE = 0;
const STATUS = "green"; // "green" | "yellow" | "red"
// ═══════════════════════════════════════

const ICS = "https://calendar.google.com/calendar/ical/f3c72bce6e9b4784ce23c34fda61c8c99bd275f1bb38bd5619394fd1435f72bf%40group.calendar.google.com/public/basic.ics";
const WA = "5519953335757";
const IG = "duo.linguas";
const ARRIVAL = new Date(2026, 5, 11);
const NL = String.fromCharCode(10);

const S_TEXT  = { green:"Not nice. But ok.", yellow:"Move your A.S.S. Protocol. Now.", red:"FODEEEEU." };
const S_BG    = { green:"rgba(40,80,50,0.85)", yellow:"rgba(130,95,20,0.85)", red:"rgba(130,40,35,0.85)" };
const S_BORD  = { green:"rgba(40,80,50,0.5)", yellow:"rgba(130,95,20,0.5)", red:"rgba(130,40,35,0.5)" };

const DS  = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const DL  = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const MS  = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const ML  = ["January","February","March","April","May","June","July","August","September","October","November","December"];

let weekOff=0, hourStart=Math.max(0,new Date().getHours()-1), evts=[], ready=false, sel=null;

/* STATUS */
var sc = document.getElementById("sc");
sc.style.background = S_BG[STATUS];
sc.style.borderColor = S_BORD[STATUS];
var sIcon=document.getElementById("s-icon"); if(sIcon) sIcon.style.color = "#F1EFE8";
document.getElementById("s-txt").textContent = S_TEXT[STATUS];

/* LESSONS */
document.getElementById("ln").textContent = LESSONS_DONE;

/* CLOCKS */
function tick() {
  try {
    var f = function(tz){ return new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",timeZone:tz}); };
    document.getElementById("t-sp").textContent = f("America/Sao_Paulo");
    document.getElementById("t-at").textContent = f("Europe/Athens");
  } catch(e) {
    var n=new Date();
    var fmt=function(d){ return String(d.getUTCHours()).padStart(2,"0")+":"+String(d.getUTCMinutes()).padStart(2,"0"); };
    document.getElementById("t-sp").textContent = fmt(new Date(n.getTime()-3*3600000));
    document.getElementById("t-at").textContent = fmt(new Date(n.getTime()+3*3600000));
  }
}
tick(); setInterval(tick,30000);

/* COUNTDOWN */
var days = Math.ceil((ARRIVAL - new Date())/86400000);
document.getElementById("cd").textContent = Math.max(0,days);

/* WEATHER */
fetch("https://corsproxy.io/?url="+encodeURIComponent("https://wttr.in/Sao+Paulo?format=j1"))
  .then(function(r){ return r.json(); })
  .then(function(d){
    var temp = parseInt(d.current_condition[0].temp_C);
    document.getElementById("wval").textContent = temp+"°C";
    var ico = temp >= 30 ? "ti-sun" : temp >= 20 ? "ti-cloud-sun" : "ti-cloud";
    document.getElementById("wico").className = "ti "+ico+" weather-ico";
  })
  .catch(function(){ document.getElementById("wval").textContent = "--°C"; });

/* FETCH */
function ft(url,ms){ var c=new AbortController(); var id=setTimeout(function(){c.abort();},ms); return fetch(url,{signal:c.signal}).finally(function(){clearTimeout(id);}); }

async function loadCal() {
  var proxies=["https://corsproxy.io/?url="+encodeURIComponent(ICS),"https://api.allorigins.win/raw?url="+encodeURIComponent(ICS)];
  for(var i=0;i<proxies.length;i++){
    try{ var r=await ft(proxies[i],10000); if(!r.ok) continue; var t=await r.text(); if(t.includes("BEGIN:VCALENDAR")){ evts=parseICS(t); ready=true; render(); return; } }catch(e){continue;}
  }
  ready=true; render();
}

function parseICS(raw){
  // Unfold lines (continuation lines start with space or tab)
  var text = raw.replace(/\r\n/g,"\n").replace(/\r/g,"\n").replace(/\n[ \t]/g,"");
  var lines = text.split("\n");
  var out=[],e=null;
  for(var i=0;i<lines.length;i++){
    var ln=lines[i].trim();
    if(ln==="BEGIN:VEVENT"){e={};continue;}
    if(ln==="END:VEVENT"){if(e&&e.s)out.push(e);e=null;continue;}
    if(!e)continue;
    var ci=ln.indexOf(":");
    if(ci<0)continue;
    var prop=ln.slice(0,ci).toUpperCase();
    var val=ln.slice(ci+1).trim();
    // Handle DTSTART;TZID=... and DTSTART:...
    var propBase=prop.split(";")[0];
    if(propBase==="DTSTART")e.s=icsDate(val);
    if(propBase==="DTEND")e.en=icsDate(val);
    if(propBase==="DTSTART" && prop.indexOf("VALUE=DATE")>-1)e.s={d:icsDateOnly(val),a:true};
    if(propBase==="DTEND" && prop.indexOf("VALUE=DATE")>-1)e.en={d:icsDateOnly(val),a:true};
  }
  return out;
}
function icsDateOnly(s){ return new Date(+s.slice(0,4),+s.slice(4,6)-1,+s.slice(6,8)); }
function icsDate(s){
  var utc=s.endsWith("Z"), c=s.replace("Z","");
  // All-day: pure date YYYYMMDD
  if(c.length===8) return{d:new Date(+c.slice(0,4),+c.slice(4,6)-1,+c.slice(6,8)),a:true};
  // DateTime: YYYYMMDDTHHMMSS[Z]
  var y=+c.slice(0,4), mo=+c.slice(4,6)-1, d=+c.slice(6,8);
  var timePart=c.slice(9)||"000000";
  var h=+timePart.slice(0,2)||0, m=+timePart.slice(2,4)||0, sc=+timePart.slice(4,6)||0;
  return{d:utc?new Date(Date.UTC(y,mo,d,h,m,sc)):new Date(y,mo,d,h,m,sc),a:false};
}
function isBusy(date,hour){
  var ss=new Date(date); ss.setHours(hour,0,0,0); var se=new Date(date); se.setHours(hour+1,0,0,0);
  return evts.some(function(ev){ if(!ev.s)return false; var s=ev.s.d,en=ev.en?ev.en.d:null; if(ev.s.a)return s.getFullYear()===date.getFullYear()&&s.getMonth()===date.getMonth()&&s.getDate()===date.getDate(); return en?(s<se&&en>ss):(s>=ss&&s<se); });
}

/* WEEK */
function wDates(off){ var t=new Date(),day=t.getDay(),mon=new Date(t); mon.setDate(t.getDate()+(day===0?-6:1-day)+off*7); mon.setHours(0,0,0,0); return Array.from({length:7},function(_,i){var d=new Date(mon);d.setDate(mon.getDate()+i);return d;}); }
function wLabel(dates){ var s=dates[0],e=dates[4]; return s.getMonth()===e.getMonth()?MS[s.getMonth()]+" "+s.getDate()+"\u2013"+e.getDate()+", "+s.getFullYear():MS[s.getMonth()]+" "+s.getDate()+" \u2013 "+MS[e.getMonth()]+" "+e.getDate()+", "+e.getFullYear(); }

/* MSG */
function buildMsg(date,hour){
  var dayIdx=date.getDay()===0?6:date.getDay()-1; var dow=DL[dayIdx]||"",time=String(hour).padStart(2,"0")+":00";
  return ["Dear Poutana Please,","","I need a class. I'd like to book on "+dow+", "+ML[date.getMonth()]+" "+date.getDate()+" at "+time+".","","D.P","",'"Because the right tongue makes all the difference."'].join(NL);
}

/* SELECT */
function selectSlot(d,h){
  sel={d:d,h:h};
  var atH=(h+6)%24, dow=DS[d.getDay()-1]||"";
  document.getElementById("ban-time").textContent=dow+" "+d.getDate()+" "+MS[d.getMonth()]+" \u00B7 "+String(h).padStart(2,"0")+":00";
  document.getElementById("ban-sub").textContent="BR "+String(h).padStart(2,"0")+":00  \u00B7  GR "+String(atH).padStart(2,"0")+":00";
  document.getElementById("banner").classList.add("show");
  render();
}
function clearSel(){ sel=null; document.getElementById("banner").classList.remove("show"); render(); }
document.getElementById("ban-x").onclick=clearSel;

/* CONTACT */
document.getElementById("btn-wa").onclick=function(){ if(!sel)return; window.open("https://wa.me/"+WA+"?text="+encodeURIComponent(buildMsg(sel.d,sel.h)),"_blank"); };
document.getElementById("btn-sms").onclick=function(){ if(!sel)return; window.location.href="sms:+"+WA+"&body="+encodeURIComponent(buildMsg(sel.d,sel.h)); };
document.getElementById("btn-ig").onclick=function(){ window.open("https://ig.me/m/"+IG,"_blank"); };
document.getElementById("btn-ft").onclick=function(){ window.location.href="facetime:+"+WA; };
document.getElementById("f-wa").onclick=function(){ if(!sel)return; window.open("https://wa.me/"+WA+"?text="+encodeURIComponent(buildMsg(sel.d,sel.h)),"_blank"); };
document.getElementById("f-sms").onclick=function(){ if(!sel)return; window.location.href="sms:+"+WA+"&body="+encodeURIComponent(buildMsg(sel.d,sel.h)); };
document.getElementById("f-ig").onclick=function(){ window.open("https://ig.me/m/"+IG,"_blank"); };
document.getElementById("f-ft").onclick=function(){ window.location.href="facetime:+"+WA; };

/* RENDER */
function mk(tag,cls){var e=document.createElement(tag);if(cls)e.className=cls;return e;}

function render(){
  var dates=wDates(weekOff), today=new Date(); today.setHours(0,0,0,0);
  document.getElementById("wlbl").textContent=wLabel(dates);
  var g=document.getElementById("grid"); g.innerHTML="";

  var corner=mk("div"); corner.style.cssText="display:flex;flex-direction:column;align-items:flex-end;padding-right:7px;padding-bottom:4px;gap:1px;justify-content:flex-end;";
  corner.innerHTML="<span class='tz-br'>BR</span><span class='tz-at'>GR</span>"; g.appendChild(corner);

  dates.forEach(function(d,i){
    var isT=d.getTime()===today.getTime(), c=mk("div","day-hdr");
    c.innerHTML="<div class='day-s'>"+DS[i]+"</div><div class='day-n"+(isT?" today":"")+"'>"+d.getDate()+"</div>"+(isT?"<div class='today-pip'></div>":"<div class='day-gap'></div>");
    g.appendChild(c);
  });

  var now=new Date();
  for(var h=hourStart;h<Math.min(hourStart+6,24);h++){
    var atH=(h+6)%24, tl=mk("div","tlbl");
    tl.innerHTML="<span class='tz-br'>"+String(h).padStart(2,"0")+":00</span><span class='tz-at'>"+String(atH).padStart(2,"0")+":00</span>";
    g.appendChild(tl);
    dates.forEach(function(d){
      var se=new Date(d); se.setHours(h+1,0,0,0);
      var past=se<now, bk=ready&&isBusy(d,h), isSel=sel&&sel.d===d&&sel.h===h;
      var s=mk("div","slot"+(bk?" busy":"")+(past?" past":"")+(isSel?" selected":""));
      if(bk){ s.textContent="Busy"; }
      else if(!past){(function(dd,hh){s.addEventListener("click",function(){if(sel&&sel.d===dd&&sel.h===hh){clearSel();}else{selectSlot(dd,hh);}});})(d,h);}
      g.appendChild(s);
    });
  }
}

document.getElementById("btn-prev").onclick=function(){weekOff--;clearSel();render();};
document.getElementById("btn-next").onclick=function(){weekOff++;clearSel();render();};
document.getElementById("btn-up").onclick=function(){if(hourStart>0){hourStart--;render();}};
document.getElementById("btn-dn").onclick=function(){if(hourStart<18){hourStart++;render();}};

render(); loadCal();
</script>

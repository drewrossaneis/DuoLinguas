<head>
<meta charset="UTF-8">

<title>DuoL Maps &middot; São Paulo</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#1A1714;--bg2:#141210;--bg3:#0F0D0C;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --text:#F1EFE8;--text2:#B4B2A9;--text3:#666360;
  --coral:#D85A30;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Lora',Georgia,serif;}

/* HEADER */
#header{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:48px;background:var(--bg2);border-bottom:0.5px solid var(--border2);
  display:flex;align-items:center;justify-content:space-between;padding:0 16px;
}
.h-left{display:flex;align-items:center;gap:10px;}
.h-logo-name{font-family:'EB Garamond',Georgia,serif;font-size:16px;color:var(--text);}
.h-logo-sub{font-size:6px;letter-spacing:4px;color:var(--text3);display:block;margin-top:1px;}
.h-nav{display:flex;align-items:center;gap:6px;position:absolute;left:50%;transform:translateX(-50%);}
.h-nav-link{font-size:9px;letter-spacing:2px;color:var(--text3);text-decoration:none;text-transform:uppercase;border:0.5px solid var(--border);padding:4px 10px;border-radius:2px;transition:color .2s,border-color .2s;font-family:'Lora',serif;}
.h-nav-link:hover,.h-nav-link.active{color:var(--coral);border-color:var(--coral);}

/* LAYOUT */
#layout{display:flex;height:100vh;padding-top:48px;}

/* SIDEBAR */
#sidebar{
  width:0;overflow:hidden;background:var(--bg2);border-right:0.5px solid var(--border2);
  transition:width .25s ease;flex-shrink:0;z-index:50;
}
#sidebar.open{width:170px;}
.sb-inner{width:170px;padding:16px 0;height:100%;overflow-y:auto;display:flex;flex-direction:column;}
.sb-label{font-size:9px;letter-spacing:3px;color:var(--text2);padding:0 14px 10px;white-space:nowrap;font-family:'Lora',serif;text-transform:uppercase;}
.sb-zone-btn{
  display:flex;align-items:center;gap:9px;
  padding:8px 14px;cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:background .15s;
}
.sb-zone-btn:hover{background:rgba(255,255,255,0.04);}
.sb-zone-btn.active{background:rgba(255,255,255,0.06);}
.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sb-zone-name{font-size:13px;color:var(--text);white-space:nowrap;font-family:'Lora',serif;flex:1;}
.sb-plus{font-size:18px;color:var(--text3);line-height:1;padding-right:4px;transition:color .2s;}
.sb-zone-btn:hover .sb-plus{color:var(--text2);}
.sb-divider{height:0.5px;background:var(--border2);margin:12px 14px;}
.sb-filter-btn{
  display:flex;align-items:center;gap:8px;
  padding:7px 14px;cursor:pointer;border:none;background:none;width:100%;text-align:left;
  transition:background .15s,opacity .2s;opacity:.4;
}
.sb-filter-btn.active{opacity:1;}
.sb-filter-btn:hover{background:rgba(255,255,255,0.03);}
.sb-filter-name{font-size:12px;color:var(--text);white-space:nowrap;font-family:'Lora',serif;}

/* MAP */
#map-wrap{flex:1;position:relative;}
#map{width:100%;height:100%;}

/* TOGGLE BTN */
#toggle-btn{
  position:absolute;top:12px;left:12px;z-index:10;
  background:var(--bg2);border:0.5px solid var(--border2);border-radius:3px;
  padding:7px 12px;cursor:pointer;color:var(--text2);font-size:14px;
  transition:color .2s;font-family:monospace;
}
#toggle-btn:hover{color:var(--text);}

/* SEARCH */
#search-wrap{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:10;width:280px;}
#pac-input{
  width:100%;background:var(--bg2);border:0.5px solid var(--border2);border-radius:3px;
  padding:8px 14px;font-size:11px;color:var(--text);letter-spacing:1px;outline:none;
  font-family:'Lora',Georgia,serif;
}
#pac-input::placeholder{color:var(--text3);letter-spacing:2px;font-size:10px;}
#pac-input:focus{border-color:rgba(255,255,255,0.2);}
#pin-results{display:none;background:var(--bg2);border:0.5px solid var(--border2);border-top:none;border-radius:0 0 3px 3px;max-height:160px;overflow-y:auto;}
.pin-result-item{padding:8px 14px;cursor:pointer;font-size:11px;color:var(--text2);border-bottom:0.5px solid var(--border);transition:background .15s;font-family:'Lora',serif;}
.pin-result-item:hover{background:rgba(255,255,255,0.04);color:var(--text);}

/* Google autocomplete override */
.pac-container{background:var(--bg2)!important;border:0.5px solid var(--border2)!important;border-top:none!important;border-radius:0 0 3px 3px!important;box-shadow:none!important;font-family:'Lora',Georgia,serif!important;}
.pac-item{color:var(--text2)!important;border-top:0.5px solid var(--border)!important;padding:6px 14px!important;font-size:11px!important;}
.pac-item:hover{background:rgba(255,255,255,0.04)!important;}
.pac-item-query{color:var(--text)!important;font-size:11px!important;}
.pac-matched{color:var(--coral)!important;}
.pac-icon{display:none!important;}

/* ZONES TOGGLE */
#zones-toggle{
  position:absolute;top:12px;right:12px;z-index:10;
  background:var(--bg2);border:0.5px solid var(--border2);border-radius:3px;
  padding:7px 12px;cursor:pointer;font-size:8px;letter-spacing:2px;color:var(--text2);
  transition:color .2s,border-color .2s;font-family:'Lora',serif;
}
#zones-toggle.active{border-color:var(--coral);color:var(--coral);}

/* VIEW BUTTONS */
#view-btns{position:absolute;top:52px;right:12px;z-index:10;display:flex;flex-direction:column;gap:2px;}
#view-btns button{background:var(--bg2);border:0.5px solid var(--border2);border-radius:2px;padding:5px 10px;cursor:pointer;font-size:8px;letter-spacing:2px;color:var(--text2);font-family:'Lora',serif;transition:color .2s,border-color .2s;}
#view-btns button.active{border-color:var(--coral);color:var(--coral);}

/* ZONE PANEL — desliza da esquerda */
#zone-panel{
  position:fixed;top:48px;left:0;bottom:0;z-index:60;
  width:0;overflow:hidden;
  background:var(--bg2);border-right:0.5px solid var(--border2);
  transition:width .3s ease;
}
#zone-panel.visible{width:380px;}
.zp-inner{width:380px;height:100%;overflow-y:auto;display:flex;flex-direction:column;}
.zp-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;border-bottom:0.5px solid var(--border);
  position:sticky;top:0;background:var(--bg2);z-index:1;flex-shrink:0;
}
.zp-header-zone{display:flex;align-items:center;gap:10px;}
.zp-header-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.zp-header-name{font-family:'EB Garamond',Georgia,serif;font-size:18px;color:var(--text);}
.zp-close{font-size:16px;color:var(--text2);cursor:pointer;background:none;border:none;padding:4px 8px;transition:color .2s;font-family:'Lora',serif;}
.zp-close:hover{color:var(--text);}
.zp-body{padding:20px;display:flex;flex-direction:column;gap:14px;}
.zp-zone-area{font-size:8px;letter-spacing:2px;color:var(--text3);font-family:'Lora',serif;}
.zp-desc{font-size:12px;color:var(--text2);line-height:1.7;font-family:'Lora',serif;}
.zp-divider{height:0.5px;background:var(--border2);}
.zp-stats{display:flex;flex-direction:column;gap:12px;}
.zp-stat{display:flex;flex-direction:column;gap:3px;}
.zp-stat-label{font-size:8px;letter-spacing:2px;color:var(--text3);font-family:'Lora',serif;}
.zp-stat-value{font-size:12px;color:var(--text2);font-family:'Lora',serif;line-height:1.5;}
.zp-stat-value span{color:var(--coral);}

/* FOOTER */
#footer{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  height:28px;background:var(--bg3);border-top:0.5px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;pointer-events:none;
}
.f-slogan{font-family:'EB Garamond',Georgia,serif;font-size:9px;font-style:italic;color:var(--text3);}
.f-coords{font-size:7px;color:var(--border2);letter-spacing:1px;font-family:monospace;}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* Google InfoWindow override */
.gm-style .gm-style-iw-c {
  background: #141210 !important;
  border-radius: 6px !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
  padding: 0 !important;
}
.gm-style .gm-style-iw-d {
  overflow: hidden !important;
  max-height: none !important;
}
.gm-style .gm-style-iw-t::after {
  background: #141210 !important;
}
.gm-style .gm-style-iw-ch {
  padding-top: 0 !important;
}
.gm-style button.gm-ui-hover-effect {
  top: 4px !important;
  right: 4px !important;
}
.gm-style button.gm-ui-hover-effect span {
  background-color: #888780 !important;
}
</style>

  map=new google.maps.Map(document.getElementById('map'),{
    center:{lat:-23.6042,lng:-46.6922},zoom:13,
    mapTypeId:'roadmap',styles:darkStyles,
    disableDefaultUI:true,zoomControl:true,
    zoomControlOptions:{position:google.maps.ControlPosition.RIGHT_CENTER}
  });

  // KML — pins do My Maps
  var kml=new google.maps.KmlLayer({
    url:'https://www.google.com/maps/d/kml?forcekml=1&mid='+MY_MAPS_ID,
    map:map,preserveViewport:true,suppressInfoWindows:true
  });

  var infoWindow=new google.maps.InfoWindow();

  kml.addListener('click',function(e){
    var name=(e.featureData&&e.featureData.name)||'';
    var desc=(e.featureData&&e.featureData.description)||'';
    var loc=e.latLng;

    // Zoom no pin — só se estiver dentro da área de SP
    var spBounds2=new google.maps.LatLngBounds(
      new google.maps.LatLng(-24.1,-47.0),
      new google.maps.LatLng(-23.2,-46.0)
    );
    if(spBounds2.contains(loc)){
      map.panTo(loc);
      map.setZoom(16);
    } else {
      map.panTo(loc);
      map.setZoom(13);
    }

    // Montar conteúdo do popup — estilo DuoLínguas
    var zone=getZoneForPoint(loc.lat(),loc.lng());
    var zoneTag='';
    if(zone&&ZONES[zone]){
      var zdata=ZONES[zone];
      zoneTag='<div style="margin-top:8px;"><span style="background:rgba(255,255,255,0.1);color:#F1EFE8;font-size:10px;letter-spacing:1px;padding:3px 8px;border-radius:2px;font-family:Lora,serif;">#'+zdata.label+'</span></div>';
    }

    // Extrair imagem da descrição se houver
    var imgMatch=desc.match(/<img[^>]+src="([^"]+)"/i);
    var imgHtml=imgMatch?'<img src="'+imgMatch[1]+'" style="width:100%;height:140px;object-fit:cover;border-radius:4px;margin-bottom:8px;">':'';

    // Limpar descrição de tags HTML
    var cleanDesc=desc.replace(/<[^>]*>/g,'').trim();

    var mapsUrl='https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(name+' Sao Paulo');

    var content='<div style="background:#141210;color:#F1EFE8;padding:14px;border-radius:6px;min-width:220px;max-width:280px;font-family:Lora,Georgia,serif;">'
      +imgHtml
      +'<div style="font-size:14px;font-weight:500;margin-bottom:4px;">'+name+'</div>'
      +(cleanDesc?'<div style="font-size:11px;color:#B4B2A9;line-height:1.5;margin-bottom:8px;">'+cleanDesc+'</div>':'')
      +zoneTag
      +'<a href="'+mapsUrl+'" target="_blank" style="display:inline-block;margin-top:10px;background:transparent;border:0.5px solid #D85A30;color:#D85A30;font-size:9px;letter-spacing:2px;padding:5px 12px;border-radius:2px;text-decoration:none;font-family:Lora,serif;">VER NO MAPS &#x2197;</a>'
      +'</div>';

    infoWindow.setContent(content);
    infoWindow.setPosition(loc);
    infoWindow.open(map);

    if(name) logSearch(name);
  });

  map.addListener('click',function(){infoWindow.close();});

  loadPinData();

  // Polígonos das zonas — SEM ação no clique
  Object.keys(ZONES).forEach(function(key){
    var z=ZONES[key];
    z.paths.forEach(function(path){
      var poly=new google.maps.Polygon({
        paths:path,strokeColor:z.color,strokeOpacity:0.8,strokeWeight:2,
        fillColor:z.color,fillOpacity:z.fillOpacity,map:map,clickable:false
      });
      if(!polygons[key])polygons[key]=[];
      polygons[key].push(poly);
    });
  });

  // Autocomplete com bias para SP
  var input=document.getElementById('pac-input');
  var spBounds=new google.maps.LatLngBounds(
    new google.maps.LatLng(-24.0,-46.9),
    new google.maps.LatLng(-23.3,-46.3)
  );
  autocomplete=new google.maps.places.Autocomplete(input,{
    fields:['geometry','name','formatted_address'],
    bounds:spBounds,strictBounds:false
  });
  autocomplete.addListener('place_changed',onPlaceSelected);

  input.addEventListener('input',function(){
    var q=input.value.trim().toLowerCase();
    if(q.length<2){hidePinResults();return;}
    showPinResults(pinData.filter(function(p){return p.name.toLowerCase().indexOf(q)>-1;}));
  });
  input.addEventListener('keydown',function(e){
    if(e.key==='Escape'){hidePinResults();input.value='';}
  });

  map.addListener('click',function(){hidePinResults();});
}

function loadPinData(){
  fetch('https://corsproxy.io/?url='+encodeURIComponent('https://www.google.com/maps/d/kml?forcekml=1&mid='+MY_MAPS_ID))
    .then(function(r){return r.text();})
    .then(function(xml){
      var doc=new DOMParser().parseFromString(xml,'text/xml');
      pinData=[];
      doc.querySelectorAll('Placemark').forEach(function(pm){
        var nameEl=pm.querySelector('name');
        var coordEl=pm.querySelector('coordinates');
        if(!nameEl||!coordEl)return;
        var coords=coordEl.textContent.trim().split(',');
        if(coords.length<2)return;
        var lng=parseFloat(coords[0]),lat=parseFloat(coords[1]);
        if(!isNaN(lat)&&!isNaN(lng))pinData.push({name:nameEl.textContent.trim(),lat:lat,lng:lng});
      });
    }).catch(function(){});
}

function showPinResults(matches){
  var container=document.getElementById('pin-results');
  if(!matches.length){hidePinResults();return;}
  container.innerHTML='';
  matches.slice(0,5).forEach(function(pin){
    var item=document.createElement('div');
    item.className='pin-result-item';
    item.textContent=pin.name;
    item.addEventListener('click',function(){
      map.panTo(new google.maps.LatLng(pin.lat,pin.lng));
      map.setZoom(16);
      hidePinResults();
      document.getElementById('pac-input').value=pin.name;
      logSearch(pin.name);
    });
    container.appendChild(item);
  });
  container.style.display='block';
}
function hidePinResults(){document.getElementById('pin-results').style.display='none';}

var selectedMarker=null;
function onPlaceSelected(){
  var place=autocomplete.getPlace();
  if(!place||!place.geometry)return;
  hidePinResults();
  var loc=place.geometry.location;
  map.panTo(loc);map.setZoom(15);
  if(selectedMarker)selectedMarker.setMap(null);
  selectedMarker=new google.maps.Marker({
    position:loc,map:map,
    icon:{path:google.maps.SymbolPath.CIRCLE,scale:8,fillColor:'#D85A30',fillOpacity:1,strokeColor:'#1A1714',strokeWeight:2}
  });
  logSearch(place.name);
}

function logSearch(term){
  var url='https://api.telegram.org/bot'+TG_TOKEN+'/sendMessage'
    +'?chat_id='+TG_CHAT_ID
    +'&text='+encodeURIComponent('DuoL Maps: '+term);
  fetch(url).catch(function(){});
}

function getZoneForPoint(lat,lng){
  var point=new google.maps.LatLng(lat,lng);
  for(var key in ZONES){
    for(var i=0;i<ZONES[key].paths.length;i++){
      var poly=new google.maps.Polygon({paths:ZONES[key].paths[i]});
      if(google.maps.geometry.poly.containsLocation(point,poly))return key;
    }
  }
  return null;
}

function toggleSidebar(){
  var sb=document.getElementById('sidebar');
  sb.classList.toggle('open');
  document.getElementById('toggle-btn').innerHTML=sb.classList.contains('open')?'&#x2190;':'&#x2192;';
}

function toggleZones(){
  zonesVisible=!zonesVisible;
  var btn=document.getElementById('zones-toggle');
  btn.textContent=zonesVisible?'ZONES ON':'ZONES OFF';
  btn.classList.toggle('active',zonesVisible);
  Object.keys(polygons).forEach(function(k){
    polygons[k].forEach(function(p){p.setMap(zonesVisible?map:null);});
  });
}

function showOnlyZone(key){
  zonesVisible=true;
  Object.keys(polygons).forEach(function(k){
    polygons[k].forEach(function(p){p.setMap(k===key?map:null);});
  });
  document.querySelectorAll('.sb-zone-btn').forEach(function(btn){
    btn.classList.toggle('active',btn.dataset.zone===key);
  });
  document.querySelector('.sb-zone-btn:first-child').classList.remove('active');
  document.getElementById('zones-toggle').textContent='ZONES ON';
  document.getElementById('zones-toggle').classList.add('active');
}

function showAllZones(){
  zonesVisible=true;
  Object.keys(polygons).forEach(function(k){
    polygons[k].forEach(function(p){p.setMap(map);});
  });
  document.querySelectorAll('.sb-zone-btn').forEach(function(btn){btn.classList.remove('active');});
  document.querySelector('.sb-zone-btn:first-child').classList.add('active');
  document.getElementById('zones-toggle').textContent='ZONES ON';
  document.getElementById('zones-toggle').classList.add('active');
}

function setMapView(view){
  document.querySelectorAll('#view-btns button').forEach(function(b){
    b.classList.toggle('active',b.dataset.view===view);
  });
  if(view==='dark')map.setOptions({styles:darkStyles,mapTypeId:'roadmap'});
  else if(view==='light')map.setOptions({styles:[],mapTypeId:'roadmap'});
  else map.setOptions({styles:[],mapTypeId:'satellite'});
}

function openZonePanel(key){
  var z=ZONE_INFO[key];
  if(!z)return;
  document.getElementById('zp-dot').style.background=z.color;
  document.getElementById('zp-name').textContent=z.label;
  var html='<div class="zp-zone-area">'+z.area+'</div>';
  html+='<div class="zp-desc">'+z.desc+'</div>';
  html+='<div class="zp-divider"></div>';
  html+='<div class="zp-stats">';
  z.stats.forEach(function(s){
    html+='<div class="zp-stat"><div class="zp-stat-label">'+s[0]+'</div><div class="zp-stat-value">'+s[1]+'</div></div>';
  });
  html+='</div>';
  document.getElementById('zp-body').innerHTML=html;
  document.getElementById('zone-panel').classList.add('visible');
  showOnlyZone(key);
}

function closePanel(){
  document.getElementById('zone-panel').classList.remove('visible');
  showAllZones();
}

// Sidebar zone buttons — isolam zona mas NÃO abrem painel
document.querySelectorAll('.sb-zone-btn[data-zone]').forEach(function(btn){
  btn.addEventListener('click',function(){showOnlyZone(btn.dataset.zone);});
});

// Filter buttons — toggle visual
document.querySelectorAll('.sb-filter-btn').forEach(function(btn){
  btn.addEventListener('click',function(){btn.classList.toggle('active');});
});
</script>

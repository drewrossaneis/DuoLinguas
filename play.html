<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DuoLínguas Play</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Helvetica+Neue:wght@300;400&display=swap');

  :root {
    --bg:        #141210;
    --bg2:       #1C1917;
    --bg3:       #232019;
    --text:      #F1EFE8;
    --text-dim:  #888780;
    --text-faint:#3a3632;
    --orange:    #D85A30;
    --border:    rgba(241,239,232,0.08);
    --card-bg:   #1C1917;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 300;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 24px 48px;
    text-align: center;
    position: relative;
  }

  .back-link {
    position: absolute;
    top: 28px;
    left: 28px;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 15px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.3s;
  }
  .back-link:hover { color: var(--orange); }
  .back-link::before { content: '← '; }

  .logo-wrap {
    width: 72px;
    height: 77px;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.1s;
  }

  .brand-name {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 28px;
    font-weight: 300;
    letter-spacing: 1px;
    color: var(--text);
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.2s;
  }

  .brand-sub {
    font-size: 8px;
    letter-spacing: 6px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-top: 4px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.3s;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px auto;
    width: 160px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.4s;
  }
  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider-dot  { width: 4px; height: 4px; border-radius: 50%; background: var(--orange); flex-shrink: 0; }

  .tagline {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 16px;
    font-style: italic;
    font-weight: 300;
    color: var(--text-dim);
    letter-spacing: 0.3px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.5s;
  }

  /* ── GRID ── */
  .grid-section {
    max-width: 680px;
    margin: 0 auto;
    padding: 16px 24px 80px;
  }

  .section-label {
    font-size: 8px;
    letter-spacing: 4px;
    color: var(--text-faint);
    text-transform: uppercase;
    margin-bottom: 28px;
    text-align: center;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.6s;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 24px;
  }

  /* ── CARD ── */
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards;
  }

  /* stagger */
  .card:nth-child(1) { animation-delay: 0.7s; }
  .card:nth-child(2) { animation-delay: 0.8s; }
  .card:nth-child(3) { animation-delay: 0.9s; }
  .card:nth-child(4) { animation-delay: 1.0s; }
  .card:nth-child(5) { animation-delay: 1.1s; }
  .card:nth-child(6) { animation-delay: 1.2s; }

  .card-icon {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: var(--card-bg);
    border-radius: 12px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    transition: border-color 0.35s, box-shadow 0.35s, transform 0.35s;
  }

  .card-icon svg {
    width: 52%;
    height: 52%;
  }
.card-icon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 11px;
  }
  .card-icon .play-overlay {
    position: absolute;
    inset: 0;
    background: rgba(216,90,48,0.0);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s;
  }

  .card-icon .play-overlay svg {
    width: 28px;
    height: 28px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  /* active card hover */
  .card.active .card-icon:hover {
    border-color: rgba(216,90,48,0.45);
    box-shadow: 0 8px 40px rgba(216,90,48,0.12);
    transform: translateY(-3px);
  }
  .card.active .card-icon:hover .play-overlay {
    background: rgba(216,90,48,0.08);
  }
  .card.active .card-icon:hover .play-overlay svg {
    opacity: 1;
  }

  .card-name {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.3px;
    color: var(--text);
    text-align: center;
    margin-top: 12px;
    line-height: 1.3;
  }

  .card-btn {
    display: inline-block;
    margin-top: 10px;
    font-size: 7.5px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--orange);
    text-decoration: none;
    border: 1px solid rgba(216,90,48,0.35);
    padding: 5px 14px;
    border-radius: 20px;
    transition: background 0.3s, color 0.3s, border-color 0.3s;
  }
  .card-btn:hover {
    background: var(--orange);
    color: var(--bg);
    border-color: var(--orange);
  }

  /* ── INACTIVE card ── */
  .card.inactive {
    display: none; /* invisible, no space */
  }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    padding: 0 24px 48px;
  }
  .footer-text {
    font-size: 8px;
    letter-spacing: 3px;
    color: var(--text-faint);
    text-transform: uppercase;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .brand-name { font-size: 24px; }
    .tagline { font-size: 14px; }
    .back-link { top: 20px; left: 16px; }
  }
</style>
</head>
